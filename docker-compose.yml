# Local stack: API + persisted SQLite / Chroma volumes (E6)
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/helix_srop.db
      CHROMA_PERSIST_DIR: ./data/chroma_db
    volumes:
      - helix_data:/app/data

volumes:
  helix_data:
